name: smartshield
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  video_player: ^2.9.2
  permission_handler: ^11.3.1
  path_provider: ^2.0.15
  flutter_svg: ^2.0.9
  cupertino_icons: ^1.0.8
  http: ^1.2.0
  crypto: ^3.0.3
  open_file: ^3.3.2
  flutter_markdown: ^0.7.3
  shared_preferences: ^2.3.0
  flutter_dotenv: ^5.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

  # App icon generation
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/icon/
    - assets/ui/
    - assets/videos/

flutter_icons:
  android: true
  ios: true
  image_path: assets/icon/app_icon.png
